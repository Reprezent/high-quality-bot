services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-highqualitybot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botuser} -d ${POSTGRES_DB:-highqualitybot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    image: ghcr.io/${GITHUB_REPOSITORY:-reprezent/high-quality-bot}:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: postgres://${POSTGRES_USER:-botuser}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-highqualitybot}
      RUST_LOG: ${RUST_LOG:-info}

volumes:
  postgres_data:
